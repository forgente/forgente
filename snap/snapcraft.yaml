name: forgente
summary: Forgente - A painless self-hosted Git service
description: |
  Forgente is a soft fork of Gitea. The goal of this project is to make the
  easiest, fastest, and most painless way of setting up a self-hosted Git
  service with GitHub-like experiences, including issue tracking, code review,
  project management, wikis, package registry, Actions and more.

icon: public/assets/img/logo.png
confinement: strict
base: core22
adopt-info: gitea

architectures:
  - build-on: armhf
  - build-on: amd64
  - build-on: arm64

environment:
  GITEA_CUSTOM: "$SNAP_COMMON"
  GITEA_WORK_DIR: "$SNAP_COMMON"
  GIT_TEMPLATE_DIR: "$SNAP/usr/share/git-core/templates"
  GIT_EXEC_PATH: "$SNAP/usr/lib/git-core"

apps:
  forgente:
    command: forgente
    plugs: [network, network-bind, removable-media]
  web:
    command: forgente web
    daemon: simple
    plugs: [network, network-bind, removable-media]
  dump:
    command: forgente dump
    plugs: [home, removable-media]
  version:
    command: forgente --version
  sqlite:
    command: usr/bin/sqlite3

parts:
  gitea:
    plugin: make
    source: .
    stage-packages: [ git, sqlite3, openssh-client ]
    build-packages: [ git, libpam0g-dev, libsqlite3-dev, build-essential]
    build-snaps: [ go/1.26/stable, node/24/stable ]
    build-environment:
      - LDFLAGS: ""
    override-pull: craftctl default && ./snap/part-gitea-pull.sh
    override-build: ./snap/part-gitea-build.sh
    prime:
      - -etc
      - -usr/lib/systemd
      - -usr/lib/gcc
      - -usr/lib/sasl2
      - -usr/lib/x86_64-linux-gnu/krb5
      - -usr/share/apport
      - -usr/share/bash-completion
      - -usr/share/git-core/contrib
      - -usr/share/man
      - -usr/share/upstart
      - -var
